{% extends 'STAFF/commen.html' %}

{% block staff_body %}
<div class="page-header">
    <h1>District Emergency Broadcast</h1>
</div>

<div style="max-width: 700px; margin: 0 auto;">
    <div class="card" style="border-top: 5px solid var(--emergency);">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Alert Title</label>
                <input type="text" name="title" class="form-control" required placeholder="e.g. Local Area Evacuation Notice">
            </div>
            <div class="form-group">
                <label>Alert Level</label>
                <select name="level" class="form-control" required>
                    <option value="Red">Red Alert (Extreme Danger)</option>
                    <option value="Orange">Orange Alert (High Risk)</option>
                    <option value="Yellow">Yellow Alert (Precaution)</option>
                    <option value="Green">Green (Safe/Update)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Emergency Message</label>
                <textarea name="message" class="form-control" rows="6" required placeholder="Describe the situation in {{ staff.district.name }} district and actions citizens should take..."></textarea>
            </div>
            <div style="background: rgba(211, 47, 47, 0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed var(--emergency);">
                <p style="color: var(--emergency); font-size: 0.85rem; margin: 0;"><i class="fas fa-tower-broadcast"></i> This alert will be broadcasted ONLY to citizens in <strong>{{ staff.district.name }}</strong>.</p>
            </div>
            <button type="submit" class="btn-submit" style="background: var(--emergency);">SEND DISTRICT ALERT</button>
        </form>
    </div>
</div>
{% endblock %}
