{% extends 'STAFF/commen.html' %}

{% block staff_body %}
<div class="page-header">
    <h1>Update Situation Status</h1>
    <a href="/staff_view_reports/" class="btn btn-sm" style="background: rgba(255,255,255,0.1); color: white;"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <div style="margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <h4 style="color: var(--text-dim); margin-bottom: 5px;">Report:</h4>
            <p><strong>{{ report.emergency_type.name }}</strong> at <strong>{{ report.location_details }}</strong></p>
            <p style="margin-top: 10px; font-size: 0.9rem;">{{ report.description }}</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Current Status</label>
                <select name="status" class="form-control" required>
                    <option value="Active" {% if report.status == 'Active' %}selected{% endif %}>Rescue Operations Ongoing</option>
                    <option value="Resolved" {% if report.status == 'Resolved' %}selected{% endif %}>Resolved / Closed</option>
                </select>
            </div>
            <div style="background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #10b981;">
                <p style="color: #10b981; font-size: 0.85rem; margin: 0;"><i class="fas fa-info-circle"></i> Use this to mark the incident as resolved once the situation is safe.</p>
            </div>
            <button type="submit" class="btn-submit">Update Incident Status</button>
        </form>
    </div>
</div>
{% endblock %}
