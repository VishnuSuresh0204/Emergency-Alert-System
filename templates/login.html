{% extends 'base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;">
    <div class="card">
        <h2 style="text-align: center;"><i class="fas fa-lock" style="margin-right: 15px; color: var(--primary);"></i>Secure Login</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit">Sign In to Dashboard</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-dim);">
            New user? <a href="/register_citizen/" style="color: var(--primary); text-decoration: none;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
