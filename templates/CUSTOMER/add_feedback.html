{% extends 'CUSTOMER/commen.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0">Share Your Feedback</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Feedback Type</label>
                        <select name="type" class="form-select" required>
                            <option value="Service">Service Quality</option>
                            <option value="Authority">Authority Performance</option>
                            <option value="System">System/Website</option>
                            <option value="General">General Feedback</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Rating</label>
                        <div class="rating-input">
                            {% for i in "12345" %}
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="rating" value="{{ i }}" required>
                                <label class="form-check-label">{{ i }} <i class="fas fa-star text-warning"></i></label>
                            </div>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea name="message" class="form-control" rows="4" placeholder="How was your experience?"
                            required></textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary-custom">Submit Feedback</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
