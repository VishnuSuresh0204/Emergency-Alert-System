{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 3rem auto;">
    <div class="card">
        <h2><i class="fas fa-user-plus" style="margin-right: 15px; color: var(--primary);"></i>Citizen Registration</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
            </div>
            <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" required>
                </div>
                <div class="form-group">
                    <label>District</label>
                    <select name="district" required>
                        <option value="">Select your district</option>
                        {% for d in districts %}
                        <option value="{{ d.id }}">{{ d.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea name="address" required rows="3"></textarea>
            </div>
            <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
            </div>
            <div class="form-group">
                <label>Profile Picture</label>
                <input type="file" name="profile_pic">
            </div>
            <button type="submit">Create Citizen Account</button>
        </form>
    </div>
</div>
{% endblock %}
