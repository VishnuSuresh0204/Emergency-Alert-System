<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Registration - District Rescue</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ef4444;
            --primary-dark: #dc2626;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            background: radial-gradient(circle at top right, rgba(239, 68, 68, 0.05), transparent), 
                        var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .reg-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .logo {
            font-size: 1.8rem; font-weight: 700; color: var(--primary); text-decoration: none;
            display: inline-flex; align-items: center; gap: 12px; margin-bottom: 20px;
        }
        .logo span { color: var(--text-light); }
        h2 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
        p.subtitle { color: var(--text-dim); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }

        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-dim); font-weight: 500; }
        
        .form-control {
            width: 100%; padding: 14px 16px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: white; font-size: 0.95rem; transition: var(--transition);
        }

        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15); }
        select.form-control { appearance: auto; }

        .btn-submit {
            width: 100%; padding: 18px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; margin-top: 20px; transition: var(--transition);
        }
        .btn-submit:hover { background: var(--primary-dark); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(239, 68, 68, 0.3); }

        .footer-link { text-align: center; margin-top: 30px; font-size: 0.95rem; color: var(--text-dim); }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>

<body>
    <div class="reg-card">
        <div class="header">
            <a href="/" class="logo">
                <i class="fas fa-shield-halved"></i>
                <span>District</span>Rescue
            </a>
            <h2>Citizen Registration</h2>
            <p class="subtitle">Join the district safety network</p>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" class="form-control" placeholder="+91 ..." required>
                </div>
                <div class="form-group">
                    <label>Home District</label>
                    <select name="district" class="form-control" required>
                        <option value="">Select District</option>
                        {% for d in districts %}
                        <option value="{{ d.id }}">{{ d.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Residential Address</label>
                <textarea name="address" class="form-control" rows="3" placeholder="Flat/House No, Street, Landmark..." required></textarea>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Choose Username</label>
                    <input type="text" name="username" class="form-control" placeholder="citizen_user" required>
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-group">
                <label>Profile Picture</label>
                <input type="file" name="profile_pic" class="form-control" style="padding: 10px;">
            </div>

            <button type="submit" class="btn-submit">Complete Registration</button>
        </form>

        <div class="footer-link">
            <p>Already have an account? <a href="/login/">Sign In here</a></p>
        </div>
    </div>
</body>

</html>
