{% extends 'ADMIN/commen.html' %}
{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h4 class="mb-0">Edit Authority</h4>
            </div>

            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" value="{{ authority.name }}" class="form-control" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" value="{{ authority.email }}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" value="{{ authority.phone }}" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Designation</label>
                        <input type="text" name="designation" value="{{ authority.designation }}"
                            class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Office Address</label>
                        <textarea name="address" class="form-control" rows="3" required>
{{ authority.office_address }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-control">
                            <option value="active" {% if authority.status == 'active' %}selected{% endif %}>
                                Active
                            </option>
                            <option value="inactive" {% if authority.status == 'inactive' %}selected{% endif %}>
                                Inactive
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Profile Picture (leave blank to keep current)
                        </label>
                        <input type="file" name="profile_pic" class="form-control" accept="image/*">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            Update Authority
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
