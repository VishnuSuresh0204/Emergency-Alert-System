{% extends 'ADMIN/commen.html' %}
{% block content %}
<div class="mb-4">
    <h2 class="page-title">Issue Official Notice</h2>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-top border-4 border-warning">
            <div class="card-body p-4">
                <p class="text-muted"><i class="fas fa-info-circle me-2"></i> This notice will be visible to all Staff
                    (Authorities) in their dashboard.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Notice Subject</label>
                        <input type="text" name="title" class="form-control"
                            placeholder="e.g., Office Hours Update / New Verification Policy" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Message / Instructions</label>
                        <textarea name="message" class="form-control" rows="8"
                            placeholder="Enter detailed instructions for the staff..." required></textarea>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="/admin_home/" class="btn btn-light px-4">Close</a>
                        <button type="submit" class="btn btn-warning px-5 fw-bold">Send to All Staff</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
