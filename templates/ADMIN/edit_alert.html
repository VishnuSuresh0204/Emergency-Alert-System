{% extends 'ADMIN/commen.html' %}

{% block admin_body %}
<div class="page-header">
    <h1>Edit Severity Alert</h1>
    <a href="/admin_view_alerts/" class="btn btn-sm" style="background: rgba(255,255,255,0.1); color: white;"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<div style="max-width: 700px; margin: 0 auto;">
    <div class="card">
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Alert Title</label>
                <input type="text" name="title" class="form-control" value="{{ alert.title }}" required>
            </div>
            
            <div class="form-group">
                <label>Severity Level</label>
                <select name="level" class="form-control" required>
                    <option value="Red" {% if alert.alert_level == 'Red' %}selected{% endif %}>Red Alert (Extreme Danger)</option>
                    <option value="Orange" {% if alert.alert_level == 'Orange' %}selected{% endif %}>Orange Alert (High Risk)</option>
                    <option value="Yellow" {% if alert.alert_level == 'Yellow' %}selected{% endif %}>Yellow Alert (Precaution)</option>
                    <option value="Green" {% if alert.alert_level == 'Green' %}selected{% endif %}>Green (Safe/Update)</option>
                </select>
            </div>

            <div class="form-group">
                <label>District</label>
                <select name="district" class="form-control" required>
                    {% for d in districts %}
                    <option value="{{ d.id }}" {% if alert.district.id == d.id %}selected{% endif %}>{{ d.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Detailed Message</label>
                <textarea name="message" class="form-control" rows="6" required>{{ alert.message }}</textarea>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                <input type="checkbox" name="is_active" id="is_active" {% if alert.is_active %}checked{% endif %} style="width: 20px; height: 20px;">
                <label for="is_active" style="margin-bottom: 0;">Is Active?</label>
            </div>
            
            <div style="background: rgba(245, 158, 11, 0.1); padding: 15px; border-radius: 10px; margin-bottom: 25px; border: 1px dashed var(--accent);">
                <p style="color: var(--accent); font-size: 0.85rem; margin: 0;"><i class="fas fa-bullhorn"></i> Updating this alert will re-notify all registered Citizens, Volunteers, and Staff in the district.</p>
            </div>
            
            <button type="submit" class="btn-submit">UPDATE ALERT</button>
        </form>
    </div>
</div>
{% endblock %}
