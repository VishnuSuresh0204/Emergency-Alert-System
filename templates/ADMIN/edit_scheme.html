{% extends 'ADMIN/commen.html' %}
{% block content %}
<div class="mb-4">
    <h2 class="page-title">Edit Scheme: {{ scheme.name }}</h2>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Scheme Name</label>
                        <input type="text" name="name" class="form-control" value="{{ scheme.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Description</label>
                        <textarea name="description" class="form-control" rows="4"
                            required>{{ scheme.description }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Eligibility Criteria</label>
                        <textarea name="eligibility" class="form-control" rows="3"
                            required>{{ scheme.eligibility }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Benefits</label>
                        <textarea name="benefits" class="form-control" rows="3"
                            required>{{ scheme.benefits }}</textarea>
                    </div>
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Application Start Date</label>
                            <input type="date" name="start_date" class="form-control"
                                value="{{ scheme.start_date|date:'Y-m-d' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Application End Date</label>
                            <input type="date" name="end_date" class="form-control"
                                value="{{ scheme.end_date|date:'Y-m-d' }}">
                        </div>
                    </div>
                    <div class="mb-4 d-flex align-items-center">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {{
                                is_active_checked }}>
                            <label class="form-check-label fw-bold ms-2" for="isActive">Currently Active</label>
                        </div>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="/admin_manage_schemes/" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-gp px-5">Update Scheme</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
