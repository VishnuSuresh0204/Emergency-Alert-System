{% extends 'ADMIN/commen.html' %}

{% block admin_body %}
<div class="page-header">
    <h1>Broadcast District Alert</h1>
</div>

<div style="max-width: 700px; margin: 0 auto;">
    <div class="card" style="border-top: 5px solid var(--primary);">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Alert Title</label>
                <input type="text" name="title" class="form-control" required placeholder="e.g. Severe Flood Warning">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Target District</label>
                    <select name="district" class="form-control" required>
                        <option value="">Select District</option>
                        {% for d in districts %}
                        <option value="{{ d.id }}">{{ d.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Alert Level</label>
                    <select name="level" class="form-control" required>
                        <option value="Red">Red Alert (Extreme Danger)</option>
                        <option value="Orange">Orange Alert (High Risk)</option>
                        <option value="Yellow">Yellow Alert (Precaution)</option>
                        <option value="Green">Green (Safe/Update)</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Emergency Message</label>
                <textarea name="message" class="form-control" rows="6" required placeholder="Describe the situation and actions citizens should take..."></textarea>
            </div>
            <div style="background: rgba(211, 47, 47, 0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed var(--primary);">
                <p style="color: var(--primary); font-size: 0.85rem; margin: 0;"><i class="fas fa-info-circle"></i> This alert will be broadcasted to all citizens registered in the selected district.</p>
            </div>
            <button type="submit" class="btn-submit" style="background: var(--emergency);">BROADCAST ALERT NOW</button>
        </form>
    </div>
</div>
{% endblock %}
