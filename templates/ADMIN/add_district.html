{% extends 'ADMIN/commen.html' %}

{% block admin_body %}
<div class="page-header">
    <h1>Add District</h1>
    <a href="/admin_manage_districts/" class="btn btn-sm" style="background: rgba(255,255,255,0.1); color: white;"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>District Name</label>
                <input type="text" name="name" class="form-control" required placeholder="e.g. Ernakulam">
            </div>
            <div class="form-group">
                <label>Description (Optional)</label>
                <textarea name="description" class="form-control" rows="5" placeholder="Details about the district area..."></textarea>
            </div>
            <button type="submit" class="btn-submit">Register District</button>
        </form>
    </div>
</div>
{% endblock %}
