{% extends 'ADMIN/commen.html' %}

{% block admin_body %}
<div class="page-header">
    <h1>Define Emergency Type</h1>
    <a href="/admin_manage_emergency_types/" class="btn btn-sm" style="background: rgba(255,255,255,0.1); color: white;"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>Type Name</label>
                <input type="text" name="name" class="form-control" required placeholder="e.g. Flood, Fire, Earthquake">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="4" required placeholder="Guidelines or description for this emergency..."></textarea>
            </div>
            <div class="form-group">
                <label>Icon / Representative Image</label>
                <input type="file" name="icon" class="form-control">
            </div>
            <button type="submit" class="btn-submit">Add Classification</button>
        </form>
    </div>
</div>
{% endblock %}
