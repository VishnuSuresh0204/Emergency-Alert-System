{% extends 'CITIZEN/commen.html' %}

{% block citizen_body %}
<div class="page-header">
    <h1>Send Feedback</h1>
</div>

<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <p style="color: var(--text-dim); margin-bottom: 25px;">Your suggestions help us improve district emergency response services.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" class="form-control" required placeholder="e.g. Rescue Delay, Staff Appreciation, App Suggestion">
            </div>
            <div class="form-group">
                <label>Your Message</label>
                <textarea name="message" class="form-control" rows="8" required placeholder="Type your detailed feedback here..."></textarea>
            </div>
            <button type="submit" class="btn-submit">Submit Feedback</button>
        </form>
    </div>
</div>
{% endblock %}
