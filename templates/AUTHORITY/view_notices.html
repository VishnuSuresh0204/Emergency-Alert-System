{% extends 'AUTHORITY/commen.html' %}
{% block content %}
<div class="mb-4">
    <h2 class="fw-bold text-success">Admin Notices & Instructions</h2>
</div>

<div class="row">
    {% for notice in notices %}
    <div class="col-md-6 mb-4">
        <div class="card h-100 border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-warning py-3">
                <h6 class="mb-0 fw-bold text-dark"><i class="fas fa-thumbtack me-2"></i> {{ notice.title }}</h6>
            </div>
            <div class="card-body bg-warning-subtle">
                <p class="mb-0" style="white-space: pre-wrap;">{{ notice.message }}</p>
            </div>
            <div class="card-footer bg-white text-end border-0">
                <small class="text-muted">Dated: {{ notice.date_posted|date:"d M Y" }}</small>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12 text-center py-5">
        <i class="fas fa-sticky-note fa-3x text-light mb-3"></i>
        <p class="text-muted">No new notices from administration.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
