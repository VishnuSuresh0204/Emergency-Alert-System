<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat - District Rescue</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(15, 23, 42, 0.9);
            --chat-me: #3b82f6;
            --chat-them: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .chat-header {
            background: var(--sidebar-bg); padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .back-btn { color: var(--text-dim); text-decoration: none; font-size: 1.2rem; transition: 0.3s; }
        .back-btn:hover { color: white; }

        .chat-container {
            flex: 1; overflow-y: auto; padding: 30px 40px; display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth;
        }
        
        .message-row { display: flex; width: 100%; }
        .message-row.me { justify-content: flex-end; }
        .message-row.them { justify-content: flex-start; }

        .message-bubble {
            max-width: 60%; padding: 12px 18px; border-radius: 18px; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .me .message-bubble { background: var(--chat-me); border-bottom-right-radius: 4px; color: white; }
        .them .message-bubble { background: var(--chat-them); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

        .message-time { font-size: 0.7rem; opacity: 0.6; margin-top: 5px; display: block; }
        .me .message-time { text-align: right; }

        .chat-input-area {
            background: var(--sidebar-bg); padding: 25px 40px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .input-wrapper {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 5px 10px; display: flex; gap: 10px; align-items: center;
        }
        .input-wrapper input {
            flex: 1; background: transparent; border: none; color: white; padding: 12px;
            outline: none; font-size: 0.95rem;
        }
        .send-btn {
            background: var(--primary); color: white; border: none; width: 45px; height: 45px;
            border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="user-info">
            <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div>
                <h2 style="font-size: 1.1rem;">Chat with {{ receiver.username }}</h2>
                <span style="font-size: 0.75rem; color: var(--text-dim);"><i class="fas fa-circle" style="color: #10b981; font-size: 0.6rem;"></i> Secure Private Channel</span>
            </div>
        </div>
        <div style="font-size: 1.5rem; color: var(--primary); opacity: 0.5;"><i class="fas fa-shield-halved"></i></div>
    </div>

    <div class="chat-container" id="chatContainer">
        {% for m in messages_list %}
        <div class="message-row {% if m.sender_id == my_lid %}me{% else %}them{% endif %}">
            <div class="message-bubble">
                <p>{{ m.message }}</p>
                <span class="message-time">{{ m.timestamp|time:"H:i" }}</span>
            </div>
        </div>
        {% empty %}
        <div style="text-align: center; padding: 100px 0; color: var(--text-dim);">
            <i class="fas fa-comments" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.2;"></i>
            <p>No messages yet. Start the conversation!</p>
        </div>
        {% endfor %}
    </div>

    <div class="chat-input-area">
        <form method="POST" id="chatForm">
            {% csrf_token %}
            <div class="input-wrapper">
                <input type="text" name="message" id="messageInput" placeholder="Type your message here..." required autocomplete="off">
                <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </form>
    </div>

    <script>
        // Scroll to bottom on load
        const container = document.getElementById('chatContainer');
        container.scrollTop = container.scrollHeight;

        // Auto-refresh every 5 seconds (Simple polling)
        setInterval(function() {
            // Only refresh if user is not typing? Or just let it be.
            // For a better experience, we could use AJAX to fetch only new messages.
            // But for now, simple reload is robust.
            // location.reload(); // Too disruptive
        }, 5000);

        // AJAX for sending message without reload could be added here for polish
    </script>
</body>
</html>
