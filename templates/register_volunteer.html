{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 3rem auto;">
    <div class="card">
        <h2 style="color: var(--accent);"><i class="fas fa-hand-holding-heart" style="margin-right: 15px;"></i>Join as Volunteer</h2>
        <p style="color: var(--text-dim); margin-bottom: 2rem;">Support your community during emergencies. Admin approval is required for all volunteers.</p>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
            </div>
            <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" required>
                </div>
                <div class="form-group">
                    <label>Assigned District</label>
                    <select name="district" required>
                        <option value="">Select district to serve</option>
                        {% for d in districts %}
                        <option value="{{ d.id }}">{{ d.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Skills & Qualifications</label>
                <textarea name="skills" required rows="3" placeholder="e.g. First Aid Certified, Swimming, Driving, Electrical Work"></textarea>
            </div>
            <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
            </div>
            <div class="form-group">
                <label>Profile/ID Document Photo</label>
                <input type="file" name="profile_pic">
            </div>
            <button type="submit" style="background: var(--accent);">Submit Volunteer Application</button>
        </form>
    </div>
</div>
{% endblock %}
